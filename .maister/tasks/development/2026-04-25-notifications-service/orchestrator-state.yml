  research_reference:
    path: .maister/tasks/research/2026-04-19-notifications-service
    research_question: >
      Jak zaprojektować usługę phpbb\notifications odpowiedzialną za powiadomienia
      do użytkowników, wysyłkę emaili oraz powiadomienia w aplikacji frontendowej,
      z lekkim REST API endpointem informującym o ilości i najnowszych powiadomieniach?
    research_type: mixed
    confidence_level: high
  phase_summaries:
    research:
      summary: >
        Full standalone phpbb\notifications service design. HTTP Polling 30s +
        304 Not Modified. Tag-aware cache (30s TTL). 4 REST endpoints: GET /count,
        GET /notifications, POST /{id}/read, POST /read. TypeRegistry + MethodManager
        extensibility via Symfony events. React <NotificationBell> frontend.
      key_findings:
        - HTTP Polling 30s with Last-Modified/304 is sufficient for forum (ADR-001)
        - Full rewrite — no legacy notification_manager dependency (ADR-004)
        - Write-time responder aggregation for Facebook-style grouping (ADR-002)
        - Tag-aware cache with event-driven invalidation (ADR-003)
        - Extensible type/method registry via Symfony events (ADR-007)
      recommended_approach: standalone-service-full-rewrite
