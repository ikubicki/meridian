task:
  title: "M8: Notifications Service (phpbb\\notifications)"
  description: >
    Implement phpbb\notifications service — standalone PHP 8.5/Symfony 8.x
    implementation with Repository → Service → Controller layered architecture.
    HTTP polling (30s), tag-aware cache, 4 REST endpoints, domain events.
    React frontend <NotificationBell> component with useNotifications hook.
  status: in_progress
  tags: [notifications, rest-api, polling, cache, react, m8]
  priority: high

