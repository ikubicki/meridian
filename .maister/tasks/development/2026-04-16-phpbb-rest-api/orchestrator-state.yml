  research_reference:
    path: .maister/tasks/research/2026-04-16-phpbb-rest-api
    research_question: |
      Jak zbudować phpbb\core jako bazę dla phpbb\api, phpbb\admin\api i phpbb\install\api
      — trzech samodzielnych aplikacji Symfony wystawiających REST API?
    research_type: mixed
    confidence_level: high
  phase_summaries:
    research:
      summary: >
        phpBB już używa raw Symfony HttpKernel bez FrameworkBundle. Trzy API dzielą wspólną
        klasę phpbb\core\Application (~40 linii) ale różne kontenery DI: forum+admin przez
        common.php, install przez startup.php. Autentykacja via API token (Bearer), routing
        przez YAML, dane mockowane hardcoded w kontrolerach. 23 pliki do stworzenia.
      key_findings:
        - phpBB używa HttpKernel bez FrameworkBundle — API to rozszerzenie YAML konfiguracji
        - install API MUSI używać startup.php, nigdy common.php (checkInstallation redirect)
        - json_exception_subscriber priority 10 zastępuje Twig-zależny forum subscriber
        - API token auth: nowa tabela phpbb_api_tokens + kernel.request subscriber
        - Nginx: 3 bloki location ^~ przed regex PHP block
      recommended_approach: >
        Kompozycja (phpbb\core\Application wraps HttpKernel), YAML routing, osobne
        PSR-4 namespace, hardcoded mock data w kontrolerach Fazy 1
