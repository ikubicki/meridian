task:
  title: "phpBB REST API — phpbb\\core\\Application + 3 entry points"
  description: |
    Zbudować REST API dla phpBB Vibed:
    - src/phpbb/core/Application.php (phpbb\core\Application — kompozycja nad HttpKernel)
    - web/api.php → phpbb\api (forum REST API, mockowane dane, auth: API token)
    - web/adm/api.php → phpbb\admin\api (admin REST API, auth gate: acl('a_'))
    - web/install/api.php → phpbb\install\api (installer REST API, startup.php bootstrap)
    Wszystkie entry pointy delegują do phpbb\core\Application::run().
  status: in_progress
  tags: [rest-api, symfony, phpbb, architecture]
  priority: high

