task:
  title: "Modern User Service — phpbb\\user\\"
  description: |
    Zbudować nowoczesny serwis użytkowników pod phpbb\user\ wyekstrahowany
    z legacy phpBB codebase. Serwis zawiera:
    - Entities (User, Session, Group, Ban, etc.)
    - Repositories (PDO, prepared statements)
    - Services (Authentication, Registration, Password, Profile, Session, Group, Ban, Search)
    - DTOs, Enums, Events, Exceptions, Contracts
    ~50 plików PHP 8.2+ z strict types, readonly properties, enums.
    Zero zależności od legacy kodu — czyste DI, PDO, interfejsy.
  status: ready_for_implementation
  tags: [user-service, php82, ddd, architecture, extraction]
  priority: high

