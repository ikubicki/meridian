    acl_depth: minimal_stub
    api_token_rename: hard_rename
    rate_limiting: deferred
    password_service: extract_to_user_service
    refresh_token_ttl_days: 30
  research_reference:
    path: .maister/tasks/research/2026-04-19-auth-unified-service
    research_question: |
      How should phpbb\auth be designed as a unified service handling both AuthN and AuthZ,
      with stateless JWT tokens and user/group token elevation model?
    research_type: mixed
    confidence_level: high
  phase_summaries:
    research:
      summary: |
        Hybrid stateless/cached architecture: JWT access tokens (15-min, HS256) carry identity
        and permission version; ACL bitfield loaded from cache O(1) per request. Refresh tokens
        (opaque SHA-256-hashed) stored in DB with family-based rotation. Elevated JWTs (5-min,
        aud: phpbb-admin) for admin operations. Three-layer revocation: expiry → gen counter → JTI deny list.
      key_findings:
        - "JWT carries sub, gen, pv, utype, flags (global permission bitfield base64), kid"
        - "RefreshTokenRepository + AclCacheRepository in infrastructure layer"
        - "Three interfaces: AuthenticationServiceInterface, AuthorizationServiceInterface, TokenServiceInterface"
        - "AuthenticationSubscriber (priority 16) + AuthorizationSubscriber (priority 8)"
        - "Existing phpbb\\user BanService and PasswordService to be reused"
      recommended_approach: "Implement three-interface facade with clean separation of concerns"
    codebase_analysis:
      key_files: []
      primary_language: "PHP 8.4"
      summary: null
    gap_analysis:
      integration_points: []
      summary: null
    specification:
