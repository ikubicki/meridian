task:
  title: "M3 — Auth Unified Service (phpbb\\auth)"
  description: |
    Implement the unified Auth Service replacing the current mock authentication.
    Real Argon2id password verification, JWT issuance from DB, generation counter
    revocation, elevated admin tokens, ACL bitfield authorization, refresh token
    rotation. Endpoints: POST /auth/login, POST /auth/logout, POST /auth/refresh,
    POST /auth/elevate. Update AuthSubscriber to validate gen+pv claims against DB.
  status: in_progress
  tags: [auth, jwt, acl, security, m3]
  priority: high

task_context:
  risk_level: high
  clarifications_resolved: true
  scope_expanded: false
  architecture_decision: "hybrid-stateless-cached"
  tech_clarified: true
  task_characteristics:
    has_reproducible_defect: false
    modifies_existing_code: true
    creates_new_entities: true
    involves_data_operations: true
    ui_heavy: false
  scope_decisions:
