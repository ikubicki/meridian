      research:
        summary: "Zero-config plugin architecture using #[AutoconfigureTag] + #[AutowireIterator]. Three plugin interfaces: PostContentPluginInterface (post text), MediaPluginInterface (avatars/media, async), MetadataPluginInterface (JSON fields on entities). ContentStage enum enforces PRE_SAVE/POST_SAVE/PRE_OUTPUT. Config-driven via phpbb_config (no content_format column). 8 ADRs documented."
        key_findings:
          - "PostContentPluginInterface tagged with phpbb.post_plugin — auto-discovered by DI"
          - "Two injection points: ThreadsService (PRE_SAVE) + PostsController::postToArray() (PRE_OUTPUT)"
          - "MediaPlugin async via Symfony Messenger Bus dispatch"
          - "MetadataPlugin: ADD COLUMN metadata MEDIUMTEXT NULL on 5 tables"
          - "s9e legacy = plugin with canProcess() detecting bbcode_uid patterns"
          - "ConfigTextService needed for phpbb_config_text (already in DB, no service layer yet)"
        recommended_approach: "Symfony #[AutoconfigureTag] + #[AutowireIterator] with ContentStage enum enforcement"
