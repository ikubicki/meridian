    research:
      summary: "Root cause: $phpbb_root_path='./' is URL-relative; fails with CWD=/var/www/phpbb/web/. Layer 1 (startup.php + common.php): replace with __DIR__-based paths. Layer 2 (container_builder + config_php_file): add $filesystem_root_path param. Layer 3 (35+ YAML services): deferred."
      key_findings:
        - "startup.php lines 75+83: vendor/autoload.php via __DIR__/../../../vendor/autoload.php"
        - "common.php ~12 lines: replace $phpbb_root_path.src/phpbb/ with __DIR__-based"
        - "container_builder.__construct: add filesystem_root_path 2nd param, use in get_config_path/get_cache_dir/register_ext_compiler_pass"
        - "config_php_file: pass PHPBB_FILESYSTEM_ROOT instead of $phpbb_root_path"
        - "bin/phpbbcli.php: update container_builder call site"
      recommended_approach: "Layers 1+2 in order: startup.php → common.php bootstrap requires → container_builder → config_php_file → phpbbcli.php"
