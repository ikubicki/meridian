task:
  title: "Refactor URL generation — clean adm/ and base paths"
  description: "Refactor all functions that generate URLs to not use filesystem paths like $phpbb_root_path or $phpbb_admin_path directly. URLs should be generated using absolute web paths (/adm/ for admin, / for base) regardless of where PHP runs from. Fix root causes so append_sid(), generate_board_url(), redirect(), and $phpbb_admin_path all produce clean web URLs without filesystem prefixes."
  status: in-progress
  tags: [php, paths, url-generation, phpbb, refactoring]
  priority: high

