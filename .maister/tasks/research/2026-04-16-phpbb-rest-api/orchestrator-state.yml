task:
  title: "phpBB REST API — web/api.php + adm/api.php + install/api.php"
  description: |
    Zaprojektować i zaimplementować REST API dla phpBB:
    - web/api.php → phpbb\api (Symfony app, dziedziczy z phpbb\core)
    - web/adm/api.php → phpbb\admin\api (Symfony app, dziedziczy z phpbb\core)
    - web/install/api.php → phpbb\install\api (Symfony app, dziedziczy z phpbb\core)
    Poki co zwraca mockowane dane. Docelowo zastępuje wszystkie istniejące entry pointy.
  status: in_progress
  tags: [rest-api, symfony, phpbb, architecture]
  priority: high

research_context:
  research_type: mixed
  research_question: |
    Jak zbudować phpbb\core jako bazę dla phpbb\api, phpbb\admin\api i phpbb\install\api
    — trzech samodzielnych aplikacji Symfony wystawiających REST API, które docelowo
    zastąpią wszystkie istniejące web entry pointy phpBB?
  scope:
    included:
      - Composer.json i PSR-4 autoloading
      - Istniejące Symfony komponenty (HttpKernel, HttpFoundation, Routing, DI)
      - Struktura istniejących entry pointów (app.php, index.php, adm/index.php)
      - Symfony Application/HttpKernel jako base klasa
      - Wzorce REST API z autentykacją sesji phpBB
      - Mockowane endpointy jako punkt startowy
    excluded:
      - Implementacja wszystkich endpointów (zbyt szeroki zakres)
      - Migracja bazy danych
      - Zmiany w szablonach Twig
    constraints:
      - PHP 7.2+ (composerjson platform)
      - Symfony 3.4 (aktualna wersja w projekcie)
      - Musi działać obok istniejących entry pointów
