  tags: [php, composer, autoload, refactoring]
  priority: medium

research_context:
  research_type: technical
  research_question: "How can all require/include statements in the phpBB codebase be replaced with Composer PSR-4 autoload?"
  scope:
    included:
      - Manual require/include statements in web/*.php entry points
      - Manual require/include in src/phpbb/**/*.php classes
      - composer.json autoload configuration
      - Bootstrap/startup sequence
      - Third-party vendor loading
    excluded:
      - Twig template files
      - JavaScript/CSS files
    constraints:
      - Must maintain phpBB compatibility
      - Must work inside Docker container
  methodology:
    - Static codebase analysis
    - Bootstrap chain tracing
    - Namespace/PSR-4 compliance inventory
    - Composer autoload map verification
    - Dynamic include classification and risk analysis
  sources:
    - web/*.php entry points
    - src/phpbb/common/common.php
    - src/phpbb/common/startup.php
    - src/phpbb/forums/class_loader.php
    - src/phpbb/**/*.php namespace and include scans
    - composer.json
    - vendor/composer/autoload_psr4.php
    - vendor/composer/autoload_classmap.php
    - vendor/composer/autoload_files.php
  confidence_level: high
  gathering_strategy:
