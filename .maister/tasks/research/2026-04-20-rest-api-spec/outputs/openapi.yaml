openapi: 3.1.0
info:
  title: phpBB REST API
  version: 4.0.0
  description: |
    REST API contract for phpBB rewrite (Symfony 8.x / PHP 8.2+).
    All endpoints require Bearer JWT unless marked otherwise.
    Naming: camelCase for JSON fields and query parameters.

    ## Authentication

    Most endpoints require a valid Bearer JWT (`Authorization: Bearer <accessToken>`).
    Obtain tokens via `POST /auth/login` or `POST /auth/sso/{provider}/callback`.
    Tokens expire after 15 minutes — use `POST /auth/refresh` with your `refreshToken` to renew.

    Some admin and moderator operations additionally require an **elevated token**
    (obtained via `POST /auth/elevate`). These endpoints are marked with
    `x-permission: a_*` or `m_*` and typically need the `acp` or `mcp` scope.

    Endpoints marked `security: []` are public and do not require authentication.

    ## Access Control

    Each protected endpoint carries an `x-permission` annotation indicating the
    required permission. Permissions are grouped by role:

    ### Forum permissions (per-forum, set by admin)
    | Permission | Who can use it | Description |
    |---|---|---|
    | `f_list` | Registered users | See the forum in listings |
    | `f_read` | Registered users | Read topics and posts |
    | `f_post` | Registered users | Start new topics |
    | `f_reply` | Registered users | Reply to existing topics |
    | `f_edit` | Registered users | Edit own posts (time-limited) |
    | `f_search` | Registered users | Search within forums |
    | `f_report` | Registered users | Report posts to moderators |
    | `f_sticky` | Trusted users | Post sticky topics |

    ### Moderator permissions (per-forum, assigned to users/groups)
    | Permission | Who can use it | Description |
    |---|---|---|
    | `m_edit` | Moderators | Edit any post in the forum |
    | `m_delete` | Moderators | Soft-delete posts and topics |
    | `m_approve` | Moderators | Approve posts/topics waiting for review |
    | `m_move` | Moderators | Move topics to another forum |
    | `m_split` | Moderators | Split a topic into two |
    | `m_merge` | Moderators | Merge two topics together |
    | `m_lock` | Moderators | Lock/unlock topics |
    | `m_announce` | Moderators | Post announcements |

    ### Admin permissions (global, requires elevated token with `acp` scope)
    | Permission | Who can use it | Description |
    |---|---|---|
    | `a_forum` | Administrators | Create, edit, delete forums and their settings |
    | `a_ban` | Administrators | Issue and manage bans |
    | `a_user` | Administrators | Manage user accounts (activate, delete, change type) |
    | `a_group` | Administrators | Create and manage user groups |
    | `a_board` | Administrators | Change board-wide configuration |
    | `a_search` | Administrators | Rebuild the full-text search index |
    | `a_announce` | Administrators | Post global announcements |

    ### User preferences (global, granted to all registered users by default)
    | Permission | Who can use it | Description |
    |---|---|---|
    | `u_sendpm` | Registered users | Send and receive private messages |
    | `u_attach` | Registered users | Upload file attachments |
    | `u_viewprofile` | Registered users | View other users' profiles |

    ### How the API signals permission errors
    - **401 Unauthorized** — missing or expired JWT; re-authenticate.
    - **403 Forbidden** — authenticated but lacking the required permission.
      The response body includes the human-readable reason, e.g.:
      ```json
      { "error": "You do not have permission to post in this forum.", "status": 403 }
      ```

    ## JWT Claims Reference

    All access tokens are signed JWTs. The payload carries these claims:

    | Claim | Type | Description |
    |---|---|---|
    | `sub` | string | User ID (string per RFC 7519) |
    | `username` | string | Current display username |
    | `utype` | integer | User type: `0`=Normal, `1`=Inactive, `2`=Bot, `3`=Founder |
    | `gen` | integer | Token generation — incremented by `POST /auth/logout-all`; tokens with stale gen are rejected |
    | `pv` | integer | Password version — incremented on password change; tokens with stale pv are rejected |
    | `flags` | string[] | Elevated scope claims granted at `POST /auth/elevate` (e.g. `["acp"]`, `["mcp"]`) |
    | `kid` | string | Signing key ID for key rotation support |
    | `iat` | integer | Issued-at timestamp (Unix) |
    | `exp` | integer | Expiry timestamp (Unix) — access tokens expire after 15 minutes |

    **Example payload:**
    ```json
    {
      "sub": "42",
      "username": "alice",
      "utype": 0,
      "gen": 3,
      "pv": 1,
      "flags": ["acp"],
      "kid": "key-2026",
      "iat": 1745000000,
      "exp": 1745000900
    }
    ```

    In middleware/subscribers, retrieve the decoded token from `$request->attributes->get('_api_token')`.
    Check elevated scope with: `in_array('acp', $token['flags'] ?? [])`.

    ## x-permission convention (for tooling)
    Every protected operation carries an `x-permission` vendor extension specifying
    the internal phpBB ACL flag(s) required. Multiple values are AND-joined unless
    prefixed `OR:`. Example: `x-permission: f_post`.
  contact:
    name: phpBB Dev Team

servers:
  - url: /api/v4
    description: API v4

# ════════════════════════════════════════════════════════════════
# SECURITY
# ════════════════════════════════════════════════════════════════
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ──────────────────────────────────────────────────────────────
  # PARAMETERS
  # ──────────────────────────────────────────────────────────────
  parameters:
    page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    perPage:
      name: perPage
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    sort:
      name: sort
      in: query
      schema: { type: string }
      description: Field name to sort by (service-specific)
    direction:
      name: direction
      in: query
      schema: { type: string, enum: [asc, desc], default: desc }

  schemas:
    # ── Pagination ──
    PaginationMeta:
      type: object
      required: [total, page, perPage, lastPage]
      properties:
        total: { type: integer }
        page: { type: integer }
        perPage: { type: integer }
        lastPage: { type: integer }

    # ── Errors ──
    Error:
      type: object
      required: [error, status]
      properties:
        error: { type: string }
        status: { type: integer }

    ValidationError:
      type: object
      required: [errors, status]
      properties:
        status:
          type: integer
          examples: [422]
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

    # ════════════════════════════════════════════════════════════
    # AUTH
    # ════════════════════════════════════════════════════════════
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 255 }
        password: { type: string, minLength: 6 }

    TokenPair:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn:
          type: integer
          examples: [900]
        tokenType:
          type: string
          examples: [bearer]

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    ElevateRequest:
      type: object
      required: [scopes]
      properties:
        scopes: { type: array, items: { type: string, enum: [acp, mcp] } }
      oneOf:
        - title: PasswordElevation
          properties:
            password: { type: string }
          required: [password]
        - title: SsoElevation
          description: >
            User obtains a fresh authorization code via GET /auth/sso/{provider}/authorize
            (using a popup — iframes are not supported by providers), then passes it here.
          properties:
            provider: { type: string, enum: [google, github, facebook, apple] }
            code: { type: string, description: Fresh OAuth authorization code from re-auth popup }
            redirectUri: { type: string, format: uri }
          required: [provider, code, redirectUri]

    ElevatedTokenResponse:
      type: object
      required: [accessToken, elevatedToken, expiresIn]
      properties:
        accessToken: { type: string, description: New access token with elevated claims }
        elevatedToken: { type: string, description: Short-lived elevated scope token }
        expiresIn:
          type: integer
          examples: [300]

    # ════════════════════════════════════════════════════════════
    # FORUM / HIERARCHY
    # ════════════════════════════════════════════════════════════
    Forum:
      type: object
      required: [id, name, type, status, parentId]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        descriptionRendered: { type: string, description: HTML rendered }
        parentId: { type: integer }
        type: { type: integer, enum: [0, 1, 2], description: "0=Category, 1=Forum, 2=Link" }
        status: { type: integer, enum: [0, 1], description: "0=Unlocked, 1=Locked" }
        link: { type: string }
        image: { type: string }
        rules: { type: string }
        rulesRendered: { type: string }
        rulesLink: { type: string }
        displayOnIndex: { type: boolean }
        displaySubforumList: { type: boolean }
        topicsPerPage: { type: integer }
        enableIndexing: { type: boolean }
        enableIcons: { type: boolean }
        hasPassword: { type: boolean }
        stats:
          $ref: '#/components/schemas/ForumStats'
        lastPost:
          $ref: '#/components/schemas/ForumLastPost'
        children:
          type: array
          items: { $ref: '#/components/schemas/Forum' }
          description: Only present in tree responses

    ForumStats:
      type: object
      properties:
        postsApproved: { type: integer }
        postsUnapproved: { type: integer }
        postsSoftdeleted: { type: integer }
        topicsApproved: { type: integer }
        topicsUnapproved: { type: integer }
        topicsSoftdeleted: { type: integer }

    ForumLastPost:
      type: object
      properties:
        postId: { type: integer }
        posterId: { type: integer }
        posterName: { type: string }
        posterColour: { type: [string, "null"] }
        subject: { type: string }
        time: { type: integer, description: Unix timestamp }

    ForumPermission:
      type: object
      required: [groupId, permissions]
      properties:
        groupId: { type: integer }
        groupName: { type: string }
        permissions:
          type: object
          description: Map of permission name to value (0=Never, 1=Allow, 2=Inherit)
          additionalProperties:
            type: integer
            enum: [0, 1, 2]

    CreateForumRequest:
      type: object
      required: [name, type]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        type: { type: integer, enum: [0, 1, 2] }
        parentId: { type: integer, default: 0 }
        description: { type: string, default: "" }
        link: { type: string }
        image: { type: string }
        rules: { type: string }
        rulesLink: { type: string }
        password: { type: string }
        style: { type: integer }
        topicsPerPage: { type: integer }
        displayOnIndex: { type: boolean, default: true }
        displaySubforumList: { type: boolean, default: true }
        enableIndexing: { type: boolean, default: true }
        enableIcons: { type: boolean, default: true }

    UpdateForumRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        type: { type: integer, enum: [0, 1, 2] }
        parentId: { type: integer }
        description: { type: string }
        link: { type: string }
        image: { type: string }
        rules: { type: string }
        rulesLink: { type: string }
        password: { type: [string, "null"], description: "null = clear password" }
        style: { type: integer }
        topicsPerPage: { type: integer }
        displayOnIndex: { type: boolean }
        displaySubforumList: { type: boolean }
        enableIndexing: { type: boolean }
        enableIcons: { type: boolean }

    MoveForumRequest:
      type: object
      required: [newParentId]
      properties:
        newParentId: { type: integer }
        position: { type: string, enum: [first, last, before, after] }
        siblingId: { type: integer, description: Required if position=before|after }

    # ════════════════════════════════════════════════════════════
    # TOPICS + POSTS
    # ════════════════════════════════════════════════════════════
    Topic:
      type: object
      required: [id, forumId, title, type, status, visibility]
      properties:
        _type:
          type: string
          const: topic
          description: Discriminator field for SearchResult deserialization
        id: { type: integer }
        forumId: { type: integer }
        title: { type: string }
        iconId: { type: integer }
        type: { type: integer, enum: [0, 1, 2, 3], description: "0=Normal, 1=Sticky, 2=Announce, 3=Global" }
        status: { type: integer, enum: [0, 1, 2], description: "0=Unlocked, 1=Locked, 2=Moved" }
        visibility: { type: integer, enum: [0, 1, 2, 3], description: "0=Unapproved, 1=Approved, 2=Deleted, 3=Reapprove" }
        posterId: { type: integer }
        createdAt: { type: integer }
        firstPostId: { type: integer }
        firstPosterName: { type: string }
        firstPosterColour: { type: [string, "null"] }
        lastPostId: { type: [integer, "null"] }
        lastPosterId: { type: [integer, "null"] }
        lastPosterName: { type: [string, "null"] }
        lastPosterColour: { type: [string, "null"] }
        lastPostSubject: { type: [string, "null"] }
        lastPostTime: { type: [integer, "null"] }
        postsApproved: { type: integer }
        postsUnapproved: { type: integer }
        postsSoftdeleted: { type: integer }
        views: { type: integer }
        hasAttachments: { type: boolean }
        hasReports: { type: boolean }

    Post:
      type: object
      required: [id, topicId, forumId, posterId, postedAt, text, visibility]
      properties:
        _type:
          type: string
          const: post
          description: Discriminator field for SearchResult deserialization
        id: { type: integer }
        topicId: { type: integer }
        forumId: { type: integer }
        posterId: { type: integer }
        posterUsername: { type: string }
        postedAt: { type: integer }
        subject: { type: string }
        text: { type: string, description: Raw s9e XML }
        textRendered: { type: string, description: HTML rendered }
        iconId: { type: integer }
        visibility: { type: integer, enum: [0, 1, 2, 3] }
        editTime: { type: integer }
        editUserId: { type: [integer, "null"] }
        editCount: { type: integer }
        editReason: { type: string }
        editLocked: { type: boolean }
        hasAttachments: { type: boolean }
        hasReports: { type: boolean }
        poster:
          $ref: '#/components/schemas/UserDisplay'

    CreateTopicRequest:
      type: object
      required: [title, text]
      properties:
        title: { type: string, minLength: 1, maxLength: 255 }
        text: { type: string, minLength: 1 }
        iconId: { type: integer, default: 0 }
        type: { type: integer, enum: [0, 1, 2, 3], default: 0 }
        timeLimit: { type: integer, default: 0, description: Announce/sticky expiry in days }

    CreatePostRequest:
      type: object
      required: [text]
      properties:
        text: { type: string, minLength: 1 }
        subject: { type: [string, "null"] }
        iconId: { type: integer, default: 0 }

    EditPostRequest:
      type: object
      required: [text]
      properties:
        text: { type: string, minLength: 1 }
        subject: { type: [string, "null"] }
        editReason: { type: string, default: "" }

    SplitTopicRequest:
      type: object
      required: [postIds, newTitle]
      properties:
        postIds:
          type: array
          items: { type: integer }
          minItems: 1
          description: Posts to move into the new topic
        newTitle: { type: string, minLength: 1, maxLength: 255 }
        targetForumId: { type: integer, description: Forum for the new topic; defaults to same forum }

    MergeTopicsRequest:
      type: object
      required: [targetTopicId]
      properties:
        targetTopicId: { type: integer, description: Topic to merge into (receives all posts) }

    ReportRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 2000 }

    # ════════════════════════════════════════════════════════════
    # DRAFTS
    # ════════════════════════════════════════════════════════════
    Draft:
      type: object
      required: [id, type, text, updatedAt]
      properties:
        id: { type: integer }
        type: { type: string, enum: [topic, reply], description: "topic=new topic draft, reply=reply draft" }
        forumId: { type: integer }
        topicId: { type: [integer, "null"], description: Only for reply drafts }
        title: { type: [string, "null"], description: Only for topic drafts }
        text: { type: string }
        updatedAt: { type: integer }

    SaveDraftRequest:
      type: object
      required: [type, text]
      properties:
        type: { type: string, enum: [topic, reply] }
        forumId: { type: integer }
        topicId: { type: [integer, "null"] }
        title: { type: [string, "null"] }
        text: { type: string, minLength: 1 }

    # ════════════════════════════════════════════════════════════
    # USERS
    # ════════════════════════════════════════════════════════════
    User:
      type: object
      required: [id, username, type]
      properties:
        id: { type: integer }
        username: { type: string }
        type: { type: integer, enum: [0, 1, 2, 3], description: "0=Normal, 1=Inactive, 2=Bot, 3=Founder" }
        colour: { type: [string, "null"] }
        avatarUrl: { type: [string, "null"] }
        defaultGroupId: { type: integer }
        registeredAt: { type: integer }
        posts: { type: integer }
        lastPostTime: { type: integer }
        rank: { type: integer }
        isNew: { type: boolean }

    UserDisplay:
      type: object
      required: [id, username]
      properties:
        id: { type: integer }
        username: { type: string }
        colour: { type: [string, "null"] }
        avatarUrl: { type: [string, "null"] }

    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            email: { type: string, description: Only visible to self/admin }
            avatarType: { type: string }
            avatarWidth: { type: integer }
            avatarHeight: { type: integer }
            signature: { type: string }
            signatureRendered: { type: string }
            birthday: { type: string }
            jabber: { type: string }
            profileFields: { type: object, additionalProperties: true }

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 255 }
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        language: { type: string, default: en }
        timezone: { type: string, default: UTC }

    UpdateProfileRequest:
      type: object
      properties:
        signature: { type: string }
        birthday: { type: string }
        jabber: { type: string }
        timezone: { type: string }
        language: { type: string }
        profileFields: { type: object, additionalProperties: true }

    BanEntry:
      type: object
      required: [id, type, value, issuedBy, issuedAt, isActive]
      properties:
        id: { type: integer }
        type: { type: string, enum: [user, ip, email], description: What is banned }
        value: { type: string, description: "userId, IP address, or email address/pattern" }
        reason: { type: string }
        issuedBy: { type: integer, description: Admin userId who issued the ban }
        issuedAt: { type: integer }
        expiresAt: { type: [integer, "null"], description: null = permanent }
        isActive: { type: boolean }

    CreateBanRequest:
      type: object
      required: [type, value]
      properties:
        type: { type: string, enum: [user, ip, email] }
        value: { type: string }
        reason: { type: string, default: "" }
        expiresAt: { type: [integer, "null"], description: null = permanent }

    # ════════════════════════════════════════════════════════════
    # GROUPS
    # ════════════════════════════════════════════════════════════
    Group:
      type: object
      required: [id, name, type]
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: integer, enum: [0, 1, 2, 3], description: "0=Open, 1=Closed, 2=Hidden, 3=Special" }
        colour: { type: [string, "null"] }
        description: { type: string }
        memberCount: { type: integer }
        isDefault: { type: boolean }

    # ════════════════════════════════════════════════════════════
    # MESSAGING
    # ════════════════════════════════════════════════════════════
    Conversation:
      type: object
      required: [id, createdAt, messageCount, participantCount]
      properties:
        id: { type: integer }
        title: { type: [string, "null"] }
        createdBy: { type: integer }
        createdAt: { type: integer }
        lastMessageId: { type: [integer, "null"] }
        lastMessageAt: { type: [integer, "null"] }
        messageCount: { type: integer }
        participantCount: { type: integer }
        state: { type: string, enum: [active, pinned, archived] }
        isMuted: { type: boolean }
        lastReadMessageId: { type: [integer, "null"] }
        unreadCount: { type: integer }
        participants:
          type: array
          items: { $ref: '#/components/schemas/UserDisplay' }

    Message:
      type: object
      required: [id, conversationId, authorId, text, createdAt]
      properties:
        id: { type: integer }
        conversationId: { type: integer }
        authorId: { type: integer }
        subject: { type: [string, "null"] }
        text: { type: string }
        textRendered: { type: string }
        createdAt: { type: integer }
        editedAt: { type: [integer, "null"] }
        editCount: { type: integer }
        metadata: { type: [object, "null"] }
        author:
          $ref: '#/components/schemas/UserDisplay'

    SendMessageRequest:
      type: object
      required: [recipientIds, text]
      properties:
        recipientIds: { type: array, items: { type: integer }, minItems: 1 }
        text: { type: string, minLength: 1 }
        subject: { type: [string, "null"] }

    ReplyMessageRequest:
      type: object
      required: [text]
      properties:
        text: { type: string, minLength: 1 }

    EditMessageRequest:
      type: object
      required: [text]
      properties:
        text: { type: string, minLength: 1 }

    # ════════════════════════════════════════════════════════════
    # NOTIFICATIONS
    # ════════════════════════════════════════════════════════════
    Notification:
      type: object
      required: [id, type, itemId, isRead, createdAt]
      properties:
        id: { type: integer }
        type: { type: string }
        itemId: { type: integer }
        itemParentId: { type: [integer, "null"] }
        isRead: { type: boolean }
        createdAt: { type: integer }
        display: { type: object, description: Type-specific rendering data }
        actors:
          type: array
          items: { $ref: '#/components/schemas/UserDisplay' }
        actorCount: { type: integer }

    # ════════════════════════════════════════════════════════════
    # SEARCH
    # ════════════════════════════════════════════════════════════
    SearchResult:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/Topic'
              - $ref: '#/components/schemas/Post'
            discriminator:
              propertyName: _type
              mapping:
                topic: '#/components/schemas/Topic'
                post: '#/components/schemas/Post'
        meta:
          allOf:
            - $ref: '#/components/schemas/PaginationMeta'
            - type: object
              properties:
                executionTimeMs: { type: integer }

    # ════════════════════════════════════════════════════════════
    # STORAGE
    # ════════════════════════════════════════════════════════════
    StoredFile:
      type: object
      required: [id, assetType, originalFilename, mimeType, filesize, url]
      properties:
        id: { type: string, format: uuid }
        assetType: { type: string, enum: [attachment, avatar, export] }
        visibility: { type: string, enum: [public, private] }
        originalFilename: { type: string }
        mimeType: { type: string }
        filesize: { type: integer }
        checksum: { type: string }
        isOrphan: { type: boolean }
        uploaderId: { type: integer }
        createdAt: { type: integer }
        claimedAt: { type: [integer, "null"] }
        url: { type: string, format: uri }
        thumbnailUrl: { type: [string, "null"], format: uri }

    # ════════════════════════════════════════════════════════════
    # CONFIG
    # ════════════════════════════════════════════════════════════
    BoardConfig:
      type: object
      description: Board configuration key-value map. Keys match phpbb_config.config_name.
      additionalProperties:
        type: string

# ════════════════════════════════════════════════════════════════
# PATHS
# ════════════════════════════════════════════════════════════════
paths:

  # ──────────────────────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: User banned or inactive
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Rate limited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '401':
          description: Invalid or reused refresh token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token family
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '204': { description: Logged out }

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all sessions (increments token generation)
      responses:
        '204': { description: All sessions revoked }

  /auth/elevate:
    post:
      tags: [Auth]
      summary: Get elevated token for admin/mod operations
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ElevateRequest' }
      responses:
        '200':
          description: Elevated token issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ElevatedTokenResponse' }
        '401':
          description: Invalid password or SSO code
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/sso/{provider}/authorize:
    parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string, enum: [google, github, facebook, apple] }
    get:
      tags: [Auth]
      summary: Get OAuth authorization URL
      description: >
        Returns the URL to redirect (or open in a popup) for OAuth consent.
        Backend generates PKCE code_challenge and stores state in cache (10-min TTL).
      security: []
      parameters:
        - name: redirectUri
          in: query
          required: true
          schema: { type: string, format: uri }
          description: Frontend callback URL; must be on the allowlist
      responses:
        '200':
          description: Authorization URL generated
          content:
            application/json:
              schema:
                type: object
                required: [authorizeUrl, state]
                properties:
                  authorizeUrl: { type: string, format: uri }
                  state: { type: string, description: CSRF state to pass back in callback }
        '422':
          description: Unknown provider or invalid redirectUri
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /auth/sso/{provider}/callback:
    parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string, enum: [google, github, facebook, apple] }
    post:
      tags: [Auth]
      summary: Exchange OAuth code for JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, state, redirectUri]
              properties:
                code: { type: string }
                state: { type: string }
                redirectUri: { type: string, format: uri }
                createAccount: { type: boolean, default: true }
      responses:
        '200':
          description: SSO login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '201':
          description: New account created and authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '401':
          description: Invalid or expired authorization code
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Account creation disabled and no linked account found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Provider email already linked to another account
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Invalid state, provider error, or missing data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  # ──────────────────────────────────────────────────────────────
  # ME
  # ──────────────────────────────────────────────────────────────
  /me:
    get:
      tags: [Me]
      summary: Get current user profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserProfile' }
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    patch:
      tags: [Me]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileRequest' }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserProfile' }
        '422':
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /me/password:
    put:
      tags: [Me]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string, minLength: 6 }
      responses:
        '204': { description: Password changed }
        '401':
          description: Current password incorrect
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  # ──────────────────────────────────────────────────────────────
  # FORUMS
  # ──────────────────────────────────────────────────────────────
  /forums:
    get:
      tags: [Forums]
      summary: Get forum tree
      x-permission: f_list
      description: >
        Returns forum tree filtered by f_list ACL.
        Password-protected forums require X-Forum-Password header when accessing their topics.
      parameters:
        - name: rootId
          in: query
          schema: { type: integer }
          description: Return subtree rooted at this forum ID
      responses:
        '200':
          description: Forum tree (ACL-filtered)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Forum' }
    post:
      tags: [Forums]
      summary: Create forum
      x-permission: a_forum
      description: Requires elevated token with acp scope.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateForumRequest' }
      responses:
        '201':
          description: Forum created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Forum' }
        '403': { description: Insufficient permissions (a_forum required) }
        '422':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /forums/{forumId}:
    parameters:
      - name: forumId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Forums]
      summary: Get single forum
      x-permission: f_list
      parameters:
        - name: X-Forum-Password
          in: header
          schema: { type: string }
          description: Required if forum.hasPassword=true; grants access to forum content
      responses:
        '200':
          description: Forum details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Forum' }
        '401':
          description: Forum password required or incorrect
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { description: Forum not found }
    patch:
      tags: [Forums]
      summary: Update forum
      x-permission: a_forum
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateForumRequest' }
      responses:
        '200':
          description: Forum updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Forum' }
        '403': { description: Insufficient permissions (a_forum required) }
        '404': { description: Forum not found }
    delete:
      tags: [Forums]
      summary: Delete forum
      x-permission: a_forum
      description: >
        If moveContentTo is provided, all topics are moved there before deletion.
        If omitted, topics and subforums are deleted recursively.
      parameters:
        - name: moveContentTo
          in: query
          schema: { type: integer }
          description: Move topics to this forumId before deleting
      responses:
        '204': { description: Forum deleted }
        '403': { description: Insufficient permissions (a_forum required) }
        '404': { description: Forum not found }

  /forums/{forumId}/move:
    parameters:
      - name: forumId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Forums]
      summary: Move forum in hierarchy
      x-permission: a_forum
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MoveForumRequest' }
      responses:
        '200':
          description: Forum moved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Forum' }
        '403': { description: Insufficient permissions (a_forum required) }

  /forums/{forumId}/permissions/{groupId}:
    parameters:
      - name: forumId
        in: path
        required: true
        schema: { type: integer }
      - name: groupId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Forums]
      summary: Get group permissions for forum
      x-permission: a_forum
      responses:
        '200':
          description: Forum permission entry for group
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ForumPermission' }
        '404': { description: Forum or group not found }
    post:
      tags: [Forums]
      summary: Set/update group permissions for forum
      x-permission: a_forum
      description: >
        Full replacement of the permission set for the group in this forum.
        Omitted permissions default to Inherit (2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permissions]
              properties:
                permissions:
                  type: object
                  description: Map of permission name to value (0=Never, 1=Allow, 2=Inherit)
                  additionalProperties:
                    type: integer
                    enum: [0, 1, 2]
      responses:
        '200':
          description: Permissions updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ForumPermission' }
        '403': { description: Insufficient permissions (a_forum required) }
    delete:
      tags: [Forums]
      summary: Reset group permissions to inherited defaults
      x-permission: a_forum
      responses:
        '204': { description: Permissions reset }
        '403': { description: Insufficient permissions (a_forum required) }

  # ──────────────────────────────────────────────────────────────
  # TOPICS
  # ──────────────────────────────────────────────────────────────
  /forums/{forumId}/topics:
    parameters:
      - name: forumId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Topics]
      summary: List topics in forum
      x-permission: f_read
      parameters:
        - name: X-Forum-Password
          in: header
          schema: { type: string }
          description: Required if forum.hasPassword=true
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
        - name: sort
          in: query
          schema: { type: string, enum: [lastPostTime, createdAt, views, postsApproved], default: lastPostTime }
        - $ref: '#/components/parameters/direction'
      responses:
        '200':
          description: Paginated topic list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Topic' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401':
          description: Forum password required or incorrect
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403': { description: No f_read permission in this forum }
    post:
      tags: [Topics]
      summary: Create new topic
      x-permission: f_post
      description: >
        Requires f_post. Topic starts as Approved (visibility=1) if caller has f_noapprove,
        otherwise as Unapproved (visibility=0) pending moderation.
        For sticky (type=1) requires f_sticky; for announce (type=2) m_announce;
        for global announce (type=3) a_announce.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTopicRequest' }
      responses:
        '201':
          description: Topic created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Topic' }
        '403': { description: No f_post permission in this forum }
        '422':
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /topics/{topicId}:
    parameters:
      - name: topicId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Topics]
      summary: Get topic details
      x-permission: f_read
      responses:
        '200':
          description: Topic details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Topic' }
        '404': { description: Topic not found }
    patch:
      tags: [Topics]
      summary: Update topic (lock, change type, rename)
      x-permission: OR:m_edit,f_sticky
      description: >
        Lock/unlock requires m_lock. Title change requires m_edit or post ownership.
        Type change to sticky requires f_sticky; announce requires m_announce; global announce requires a_announce.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                type: { type: integer, enum: [0, 1, 2, 3] }
                status: { type: integer, enum: [0, 1] }
                iconId: { type: integer }
      responses:
        '200':
          description: Topic updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Topic' }
        '403': { description: Insufficient permissions }
    delete:
      tags: [Topics]
      summary: Soft-delete topic (sets visibility=2)
      x-permission: m_delete
      parameters:
        - name: reason
          in: query
          schema: { type: string }
      responses:
        '204': { description: Topic soft-deleted }
        '403': { description: Insufficient permissions (m_delete required) }

  /topics/{topicId}/move:
    parameters:
      - name: topicId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Topics]
      summary: Move topic to another forum
      x-permission: m_move
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [forumId]
              properties:
                forumId: { type: integer }
                leaveShadow: { type: boolean, default: true }
      responses:
        '200':
          description: Topic moved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Topic' }
        '403': { description: Insufficient permissions (m_move required) }

  /topics/{topicId}/approve:
    parameters:
      - name: topicId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Topics]
      summary: Approve unapproved/reapprove topic (sets visibility=1)
      x-permission: m_approve
      responses:
        '200':
          description: Topic approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Topic' }
        '403': { description: Insufficient permissions (m_approve required) }
        '409': { description: Topic is not in an approvable state }

  /topics/{topicId}/restore:
    parameters:
      - name: topicId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Topics]
      summary: Restore soft-deleted topic (sets visibility=1)
      x-permission: m_delete
      responses:
        '200':
          description: Topic restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Topic' }
        '403': { description: Insufficient permissions (m_delete required) }
        '409': { description: Topic is not soft-deleted }

  /topics/{topicId}/split:
    parameters:
      - name: topicId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Topics]
      summary: Split selected posts into a new topic
      x-permission: m_split
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SplitTopicRequest' }
      responses:
        '201':
          description: New topic created with selected posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  sourceTopic: { $ref: '#/components/schemas/Topic' }
                  newTopic: { $ref: '#/components/schemas/Topic' }
        '403': { description: Insufficient permissions (m_split required) }
        '422':
          description: Invalid post IDs or title
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /topics/{topicId}/merge:
    parameters:
      - name: topicId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Topics]
      summary: Merge this topic into another topic
      x-permission: m_merge
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MergeTopicsRequest' }
      responses:
        '200':
          description: Topics merged; returns the surviving topic
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Topic' }
        '403': { description: Insufficient permissions (m_merge required) }
        '422':
          description: Target topic not found or same-topic merge
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  # ──────────────────────────────────────────────────────────────
  # POSTS
  # ──────────────────────────────────────────────────────────────
  /topics/{topicId}/posts:
    parameters:
      - name: topicId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Posts]
      summary: List posts in topic
      x-permission: f_read
      parameters:
        - name: X-Forum-Password
          in: header
          schema: { type: string }
          description: Required if parent forum.hasPassword=true
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
        - name: sort
          in: query
          schema: { type: string, enum: [postedAt], default: postedAt }
        - $ref: '#/components/parameters/direction'
      responses:
        '200':
          description: Paginated post list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Post' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '403': { description: No f_read permission }
    post:
      tags: [Posts]
      summary: Create reply in topic
      x-permission: f_reply
      description: >
        Requires f_reply. Reply starts as Approved if caller has f_noapprove, else Unapproved.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePostRequest' }
      responses:
        '201':
          description: Reply created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Post' }
        '403': { description: No f_reply permission }
        '404': { description: Topic not found }
        '422':
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /posts/{postId}:
    parameters:
      - name: postId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Posts]
      summary: Get single post
      x-permission: f_read
      responses:
        '200':
          description: Post details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Post' }
        '404': { description: Post not found }
    patch:
      tags: [Posts]
      summary: Edit post
      x-permission: OR:f_edit,m_edit
      description: >
        Post author may edit their own post if f_edit is set (subject to f_edit_time limit).
        Moderators with m_edit may edit any post without time restriction.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EditPostRequest' }
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Post' }
        '403': { description: Cannot edit this post (no permission or time limit exceeded) }
    delete:
      tags: [Posts]
      summary: Soft-delete post (sets visibility=2)
      x-permission: m_delete
      parameters:
        - name: reason
          in: query
          schema: { type: string }
      responses:
        '204': { description: Post soft-deleted }
        '403': { description: Insufficient permissions (m_delete required) }

  /posts/{postId}/approve:
    parameters:
      - name: postId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Posts]
      summary: Approve unapproved/reapprove post (sets visibility=1)
      x-permission: m_approve
      responses:
        '200':
          description: Post approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Post' }
        '403': { description: Insufficient permissions (m_approve required) }
        '409': { description: Post is not in an approvable state }

  /posts/{postId}/restore:
    parameters:
      - name: postId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Posts]
      summary: Restore soft-deleted post (sets visibility=1)
      x-permission: m_delete
      responses:
        '200':
          description: Post restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Post' }
        '403': { description: Insufficient permissions (m_delete required) }
        '409': { description: Post is not soft-deleted }

  /posts/{postId}/report:
    parameters:
      - name: postId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Posts]
      summary: Report post to moderators
      x-permission: f_report
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportRequest' }
      responses:
        '201': { description: Report submitted }
        '403': { description: No f_report permission or post already reported by this user }

  # ──────────────────────────────────────────────────────────────
  # DRAFTS
  # ──────────────────────────────────────────────────────────────
  /drafts:
    get:
      tags: [Drafts]
      summary: List current user's drafts
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [topic, reply] }
        - name: forumId
          in: query
          schema: { type: integer }
        - name: topicId
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Draft list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Draft' }
    post:
      tags: [Drafts]
      summary: Save new draft
      x-permission: OR:f_post,f_reply
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveDraftRequest' }
      responses:
        '201':
          description: Draft saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Draft' }
        '422':
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /drafts/{draftId}:
    parameters:
      - name: draftId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Drafts]
      summary: Get draft
      description: Only owner can access their draft.
      responses:
        '200':
          description: Draft details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Draft' }
        '404': { description: Draft not found or belongs to another user }
    patch:
      tags: [Drafts]
      summary: Update draft content
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveDraftRequest' }
      responses:
        '200':
          description: Draft updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Draft' }
        '404': { description: Draft not found }
    delete:
      tags: [Drafts]
      summary: Delete draft
      responses:
        '204': { description: Draft deleted }
        '404': { description: Draft not found }

  # ──────────────────────────────────────────────────────────────
  # BANS
  # ──────────────────────────────────────────────────────────────
  /bans:
    get:
      tags: [Bans]
      summary: List all active bans
      x-permission: a_ban
      description: >
        Returns all ban entries across all types (user, ip, email).
        Use type/active filters to narrow results.
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [user, ip, email] }
          description: Filter by ban type
        - name: active
          in: query
          schema: { type: boolean, default: true }
          description: "true = only active bans, false = expired/revoked only, omit = all"
        - name: userId
          in: query
          schema: { type: integer }
          description: Filter bans issued against this user
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: Paginated ban list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/BanEntry' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '403': { description: Insufficient permissions (a_ban required) }
    post:
      tags: [Bans]
      summary: Create ban (user, IP, or email)
      x-permission: a_ban
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBanRequest' }
      responses:
        '201':
          description: Ban created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BanEntry' }
        '403': { description: Insufficient permissions (a_ban required) }
        '422':
          description: Validation failed (e.g. invalid IP pattern or email format)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /bans/{banId}:
    parameters:
      - name: banId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Bans]
      summary: Get ban entry
      x-permission: a_ban
      responses:
        '200':
          description: Ban entry
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BanEntry' }
        '403': { description: Insufficient permissions (a_ban required) }
        '404': { description: Ban not found }
    patch:
      tags: [Bans]
      summary: Update ban (change reason or expiry)
      x-permission: a_ban
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
                expiresAt: { type: [integer, "null"], description: null = permanent }
      responses:
        '200':
          description: Ban updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BanEntry' }
        '403': { description: Insufficient permissions (a_ban required) }
        '404': { description: Ban not found }
    delete:
      tags: [Bans]
      summary: Remove ban (lift)
      x-permission: a_ban
      responses:
        '204': { description: Ban lifted }
        '403': { description: Insufficient permissions (a_ban required) }
        '404': { description: Ban not found }

  # ──────────────────────────────────────────────────────────────
  # USERS
  # ──────────────────────────────────────────────────────────────
  /users:
    get:
      tags: [Users]
      summary: Search / list users
      x-permission: u_viewprofile
      description: email filter parameter requires a_viewprofile permission; returns 403 for non-admins.
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
        - name: sort
          in: query
          schema: { type: string, enum: [username, registeredAt, posts, lastPostTime], default: username }
        - $ref: '#/components/parameters/direction'
        - name: username
          in: query
          schema: { type: string }
          description: Partial match
        - name: email
          in: query
          schema: { type: string }
          description: Exact match — requires a_viewprofile; returns 403 otherwise
        - name: groupId
          in: query
          schema: { type: integer }
        - name: active
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '403': { description: Insufficient permissions (email filter requires a_viewprofile) }
    post:
      tags: [Users]
      summary: Register new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '409':
          description: Username or email already taken
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Users]
      summary: Get user profile (public view)
      x-permission: u_viewprofile
      responses:
        '200':
          description: User public profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserProfile' }
        '404': { description: User not found }

  /users/{userId}/bans:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Users]
      summary: List ban history for user
      x-permission: a_ban
      responses:
        '200':
          description: Ban history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/BanEntry' }
        '403': { description: Insufficient permissions (a_ban required) }
    post:
      tags: [Users]
      summary: Ban user (and optionally their IP / email)
      x-permission: a_ban
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBanRequest' }
      responses:
        '201':
          description: Ban created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BanEntry' }
        '403': { description: Insufficient permissions (a_ban required) }

  /users/{userId}/bans/{banId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: integer }
      - name: banId
        in: path
        required: true
        schema: { type: integer }
    delete:
      tags: [Users]
      summary: Remove ban
      x-permission: a_ban
      responses:
        '204': { description: Ban removed }
        '403': { description: Insufficient permissions (a_ban required) }
        '404': { description: Ban not found }

  /users/{userId}/type:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Users]
      summary: Get user type
      x-permission: a_user
      responses:
        '200':
          description: Current user type
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: { type: integer, enum: [0, 1, 2, 3] }
        '403': { description: Insufficient permissions (a_user required) }
    post:
      tags: [Users]
      summary: Change user type (activate, deactivate, promote to founder, set as bot)
      x-permission: a_user
      description: >
        type=0 Normal, type=1 Inactive, type=2 Bot, type=3 Founder.
        Setting type=3 (Founder) requires the caller to already be type=3.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: integer, enum: [0, 1, 2, 3] }
                reason: { type: string }
      responses:
        '200':
          description: User type changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '403': { description: Insufficient permissions (a_user required) }

  /users/{userId}/delete:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Users]
      summary: Delete user account
      x-permission: a_user
      description: >
        mode=retain — keeps posts, replaces username with "Guest".
        mode=remove — hard-deletes posts, topics, PMs attributed to user.
        mode=soft — marks user inactive, all content preserved unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [retain, remove, soft] }
      responses:
        '204': { description: User deleted }
        '403': { description: Insufficient permissions (a_user required) }
        '409': { description: Cannot delete last founder account }

  /users/check-username:
    get:
      tags: [Users]
      summary: Check username availability
      security: []
      parameters:
        - name: username
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                properties:
                  available: { type: boolean }

  /users/check-email:
    get:
      tags: [Users]
      summary: Check email availability
      security: []
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                properties:
                  available: { type: boolean }

  /password-reset:
    post:
      tags: [Users]
      summary: Request password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '202': { description: Reset email sent (always 202 to prevent enumeration) }

  /password-reset/confirm:
    post:
      tags: [Users]
      summary: Execute password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: { type: string }
                newPassword: { type: string, minLength: 6 }
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '400': { description: Invalid or expired token }

  # ──────────────────────────────────────────────────────────────
  # GROUPS
  # ──────────────────────────────────────────────────────────────
  /groups:
    get:
      tags: [Groups]
      summary: List groups (hidden groups require a_group to see)
      parameters:
        - name: type
          in: query
          schema: { type: integer, enum: [0, 1, 2, 3] }
      responses:
        '200':
          description: Group list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Group' }
    post:
      tags: [Groups]
      summary: Create group
      x-permission: a_group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string, minLength: 1, maxLength: 255 }
                type: { type: integer, enum: [0, 1, 2] }
                colour: { type: [string, "null"] }
                description: { type: string }
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Group' }
        '403': { description: Insufficient permissions (a_group required) }

  /groups/{groupId}:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Groups]
      summary: Get group details
      responses:
        '200':
          description: Group details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Group' }
    patch:
      tags: [Groups]
      summary: Update group
      x-permission: OR:a_group,a_group_leader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                colour: { type: [string, "null"] }
                description: { type: string }
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Group' }
        '403': { description: Insufficient permissions }
    delete:
      tags: [Groups]
      summary: Delete group
      x-permission: a_group
      responses:
        '204': { description: Group deleted }
        '403': { description: Insufficient permissions (a_group required) }
        '409': { description: Cannot delete special system group }

  /groups/{groupId}/members:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Groups]
      summary: List group members
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: Paginated member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        user: { $ref: '#/components/schemas/UserDisplay' }
                        isLeader: { type: boolean }
                        isPending: { type: boolean }
                        joinedAt: { type: integer }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Groups]
      summary: Add user to group / request join
      x-permission: OR:a_group,a_group_leader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: integer }
                isLeader: { type: boolean, default: false }
      responses:
        '201': { description: User added }
        '403': { description: Group is closed/hidden or insufficient permissions }

  /groups/{groupId}/members/{userId}:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: integer }
      - name: userId
        in: path
        required: true
        schema: { type: integer }
    delete:
      tags: [Groups]
      summary: Remove user from group
      x-permission: OR:a_group,a_group_leader
      responses:
        '204': { description: User removed }
        '403': { description: Insufficient permissions }

  # ──────────────────────────────────────────────────────────────
  # MESSAGING
  # ──────────────────────────────────────────────────────────────
  /conversations:
    get:
      tags: [Messaging]
      summary: List conversations
      x-permission: u_sendpm
      parameters:
        - $ref: '#/components/parameters/perPage'
        - name: state
          in: query
          schema: { type: string, enum: [active, pinned, archived], default: active }
        - name: beforeId
          in: query
          schema: { type: integer }
          description: Cursor-based pagination
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Conversation' }
                  hasMore: { type: boolean }
        '403': { description: PM feature disabled (u_sendpm required) }
    post:
      tags: [Messaging]
      summary: Send new message / start conversation
      x-permission: u_sendpm
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Message' }
                  conversation: { $ref: '#/components/schemas/Conversation' }
        '403': { description: Cannot message these recipients (blocked, PM disabled) }

  /conversations/{conversationId}:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Messaging]
      summary: Get conversation details
      x-permission: u_sendpm
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Conversation' }
        '404': { description: Conversation not found or caller is not a participant }
    delete:
      tags: [Messaging]
      summary: Leave conversation
      x-permission: u_sendpm
      responses:
        '204': { description: Left conversation }

  /conversations/{conversationId}/participants:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Messaging]
      summary: Add participant to conversation
      x-permission: u_sendpm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: integer }
      responses:
        '201': { description: Participant added }
        '403': { description: Only conversation creator or admin may add participants }
        '409': { description: User is already a participant }

  /conversations/{conversationId}/participants/{userId}:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: integer }
      - name: userId
        in: path
        required: true
        schema: { type: integer }
    delete:
      tags: [Messaging]
      summary: Remove participant from conversation
      x-permission: u_sendpm
      description: User may remove themselves; admin/creator may remove others.
      responses:
        '204': { description: Participant removed }
        '403': { description: Insufficient permissions to remove this participant }
        '404': { description: Participant not found }

  /conversations/{conversationId}/messages:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Messaging]
      summary: List messages in conversation
      x-permission: u_sendpm
      parameters:
        - $ref: '#/components/parameters/perPage'
        - name: beforeId
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Message' }
                  hasMore: { type: boolean }
    post:
      tags: [Messaging]
      summary: Reply to conversation
      x-permission: u_sendpm
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReplyMessageRequest' }
      responses:
        '201':
          description: Reply sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Message' }

  /conversations/{conversationId}/messages/{messageId}:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: integer }
      - name: messageId
        in: path
        required: true
        schema: { type: integer }
    patch:
      tags: [Messaging]
      summary: Edit message
      x-permission: u_sendpm
      description: >
        Only the message author may edit, within the configurable time window
        (pm_edit_time board config; 0 = unlimited).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EditMessageRequest' }
      responses:
        '200':
          description: Message updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Message' }
        '403': { description: Not message author or edit window expired }
    delete:
      tags: [Messaging]
      summary: Delete message (removes for caller only; deleted for all if last author)
      x-permission: u_sendpm
      responses:
        '204': { description: Message deleted }
        '403': { description: Not message author }

  /conversations/{conversationId}/read:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Messaging]
      summary: Mark conversation as read
      x-permission: u_sendpm
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                upToMessageId: { type: integer }
      responses:
        '204': { description: Marked as read }

  /conversations/{conversationId}/pin:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Messaging]
      summary: Pin conversation
      x-permission: u_sendpm
      responses:
        '204': { description: Pinned }
    delete:
      tags: [Messaging]
      summary: Unpin conversation
      x-permission: u_sendpm
      responses:
        '204': { description: Unpinned }

  /conversations/{conversationId}/archive:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Messaging]
      summary: Archive conversation
      x-permission: u_sendpm
      responses:
        '204': { description: Archived }
    delete:
      tags: [Messaging]
      summary: Unarchive conversation
      x-permission: u_sendpm
      responses:
        '204': { description: Unarchived }

  /conversations/{conversationId}/mute:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Messaging]
      summary: Mute conversation
      x-permission: u_sendpm
      responses:
        '204': { description: Muted }
    delete:
      tags: [Messaging]
      summary: Unmute conversation
      x-permission: u_sendpm
      responses:
        '204': { description: Unmuted }

  /messaging/unread:
    get:
      tags: [Messaging]
      summary: Get unread PM counts
      x-permission: u_sendpm
      responses:
        '200':
          description: Unread counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadConversations: { type: integer }
                  unreadMessages: { type: integer }

  # ──────────────────────────────────────────────────────────────
  # NOTIFICATIONS
  # ──────────────────────────────────────────────────────────────
  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: Paginated notification list
          headers:
            Last-Modified:
              schema: { type: string }
            X-Poll-Interval:
              schema:
                type: integer
                examples: [30]
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Notification' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
                  unreadCount: { type: integer }

  /notifications/count:
    get:
      tags: [Notifications]
      summary: Get unread count (polling endpoint)
      parameters:
        - name: If-Modified-Since
          in: header
          schema: { type: string }
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadCount: { type: integer }
        '304': { description: Not modified since last check }

  /notifications/{notificationId}/read:
    parameters:
      - name: notificationId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Notifications]
      summary: Mark notification as read
      responses:
        '204': { description: Marked as read }

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        '204': { description: All marked as read }

  # ──────────────────────────────────────────────────────────────
  # SEARCH
  # ──────────────────────────────────────────────────────────────
  /search:
    get:
      tags: [Search]
      summary: Search posts or topics
      x-permission: f_search
      description: >
        Results are automatically ACL-filtered (only forums where caller has f_read are included).
        Specifying forumId for a forum the caller cannot f_read returns 403.
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 3 }
        - name: type
          in: query
          schema: { type: string, enum: [posts, topics], default: posts }
        - name: forumId
          in: query
          schema: { type: integer }
        - name: authorId
          in: query
          schema: { type: integer }
        - name: sort
          in: query
          schema: { type: string, enum: [relevance, postedAt, author], default: relevance }
        - $ref: '#/components/parameters/direction'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
        - name: after
          in: query
          schema: { type: integer }
          description: Unix timestamp — results after this date
        - name: before
          in: query
          schema: { type: integer }
          description: Unix timestamp — results before this date
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResult' }
        '403': { description: forumId specified but no f_read permission }
        '422': { description: Invalid search query }

  /search/rebuild:
    post:
      tags: [Search]
      summary: Trigger full search index rebuild
      x-permission: a_search
      description: >
        Dispatches an async IndexAdminInterface::rebuild() job.
        Returns 202 immediately; progress can be polled via X-Job-Id header if supported.
      responses:
        '202': { description: Rebuild job queued }
        '403': { description: Insufficient permissions (a_search required) }

  # ──────────────────────────────────────────────────────────────
  # STORAGE
  # ──────────────────────────────────────────────────────────────
  /files:
    post:
      tags: [Storage]
      summary: Upload file
      x-permission: u_attach
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, assetType]
              properties:
                file:
                  type: string
                  format: binary
                assetType:
                  type: string
                  enum: [attachment, avatar, export]
                forumId:
                  type: integer
                visibility:
                  type: string
                  enum: [public, private]
                  default: public
      responses:
        '201':
          description: File uploaded; associate it with a post/topic to prevent orphan cleanup
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/StoredFile' }
        '413': { description: File too large }
        '415': { description: Unsupported MIME type for this assetType }
        '507': { description: Storage quota exceeded }

  /files/{fileId}:
    parameters:
      - name: fileId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Storage]
      summary: Get file metadata
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/StoredFile' }
        '404': { description: File not found }
    delete:
      tags: [Storage]
      summary: Delete file
      x-permission: u_attach
      responses:
        '204': { description: File deleted }
        '403': { description: Not file owner (admins with a_manage_files may override) }

  /files/{fileId}/download:
    parameters:
      - name: fileId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: variant
        in: query
        schema: { type: string, enum: [original, thumbnail, webp, medium] }
    get:
      tags: [Storage]
      summary: Download file content
      x-permission: authenticated
      description: >
        All file downloads require a valid JWT (authenticated user).
        Public files (visibility=public) are accessible to any logged-in user.
        Private files require the caller to be the uploader or have a_manage_files.
      responses:
        '200':
          description: File binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403': { description: Private file — insufficient permissions }
        '404': { description: File not found }

  # ──────────────────────────────────────────────────────────────
  # CONFIG
  # ──────────────────────────────────────────────────────────────
  /config:
    get:
      tags: [Config]
      summary: Get board configuration
      x-permission: a_board
      description: >
        Returns full phpbb_config map. Sensitive keys (e.g. smtp_password) are redacted.
        Non-admin callers receive 403.
      responses:
        '200':
          description: Board configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BoardConfig' }
        '403': { description: Insufficient permissions (a_board required) }
    post:
      tags: [Config]
      summary: Update board configuration values
      x-permission: a_board
      description: Partial update — only provided keys are changed. Unknown keys return 422.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BoardConfig' }
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BoardConfig' }
        '403': { description: Insufficient permissions (a_board required) }
        '422':
          description: Unknown config key or invalid value
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  # ──────────────────────────────────────────────────────────────
  # HEALTH
  # ──────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    examples: [ok]
                  version: { type: string }
