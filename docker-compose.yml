services:
  app:
    build: .
    container_name: phpbb_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PHPBB_ROOT_PATH: /var/www/phpbb/
    volumes:
      - .:/var/www/phpbb
      - ./files:/var/www/phpbb/files
      - ./cache:/var/www/phpbb/cache
      - ./store:/var/www/phpbb/store
    networks:
      - phpbb

  db:
    image: mariadb:10.11
    container_name: phpbb_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: phpbb
      MYSQL_USER: phpbb
      MYSQL_PASSWORD: phpbb
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phpbb

  nginx:
    image: nginx:alpine
    container_name: phpbb_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - .:/var/www/phpbb:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - phpbb

volumes:
  db_data:

networks:
  phpbb:
    driver: bridge
