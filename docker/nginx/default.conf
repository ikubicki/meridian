server {
    listen 80;
    server_name localhost;

    root /var/www/phpbb/web;
    index index.php;

    charset utf-8;

    # Static files — served directly, never passed to PHP
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Main location
    location / {
        try_files $uri $uri/ /app.php?$query_string;
    }

    # PHP files — also handles PATH_INFO (e.g. /install.php/support)
    location ~ ^(.+\.php)(/.*)? {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PHPBB_ROOT_PATH /var/www/phpbb/;
        include fastcgi_params;
    }

    # Assets (CSS, JS, images) served from project root
    location /assets/ {
        alias /var/www/phpbb/web/assets/;
        expires 1y;
        access_log off;
    }

    location /images/ {
        alias /var/www/phpbb/web/images/;
        expires 1y;
        access_log off;
    }

    location /adm/images/ {
        alias /var/www/phpbb/web/adm/images/;
        expires 1y;
        access_log off;
    }

    location /src/phpbb/styles/ {
        alias /var/www/phpbb/src/phpbb/styles/;
        expires 1y;
        access_log off;
    }

    location /files/ {
        alias /var/www/phpbb/files/;
    }

    # Deny access to sensitive directories (but not install/ or src/phpbb/styles/)
    location ~ ^/(src|bin|cache|store|config)/ {
        deny all;
        return 404;
    }

    # Deny dot files
    location ~ /\. {
        deny all;
        return 404;
    }

    error_log  /var/log/nginx/phpbb_error.log;
    access_log /var/log/nginx/phpbb_access.log;
}
