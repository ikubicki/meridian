services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    phpbb\api\Controller\:
        resource: '../api/Controller/'
        tags: ['controller.service_arguments']

    phpbb\api\EventSubscriber\:
        resource: '../api/EventSubscriber/'

    # ---------------------------------------------------------------------------
    # Cache layer
    # ---------------------------------------------------------------------------

    phpbb\cache\backend\FilesystemBackend:
        arguments:
            $cacheDir: '%kernel.cache_dir%/phpbb4'

    phpbb\cache\backend\NullBackend: ~

    phpbb\cache\marshaller\VarExportMarshaller: ~

    phpbb\cache\TagVersionStore: ~

    phpbb\cache\CachePoolFactory: ~

    # Default backend alias — swap to NullBackend in test env via services_test.yaml
    phpbb\cache\backend\CacheBackendInterface:
        alias: phpbb\cache\backend\FilesystemBackend

    phpbb\cache\marshaller\MarshallerInterface:
        alias: phpbb\cache\marshaller\VarExportMarshaller

    phpbb\cache\CachePoolFactoryInterface:
        alias: phpbb\cache\CachePoolFactory
        public: true

    # ---------------------------------------------------------------------------
    # Database connection (Doctrine DBAL 4 — no ORM, no DoctrineBundle)
    # ---------------------------------------------------------------------------

    phpbb\db\DbalConnectionFactory: ~

    Doctrine\DBAL\Connection:
        factory: ['@phpbb\db\DbalConnectionFactory', 'create']
        arguments:
            $host:     '%env(PHPBB_DB_HOST)%'
            $dbname:   '%env(PHPBB_DB_NAME)%'
            $user:     '%env(PHPBB_DB_USER)%'
            $password: '%env(PHPBB_DB_PASSWD)%'
        public: false

    # ---------------------------------------------------------------------------
    # User module (M2)
    # ---------------------------------------------------------------------------

    phpbb\user\Repository\DbalUserRepository: ~

    phpbb\user\Contract\UserRepositoryInterface:
        alias: phpbb\user\Repository\DbalUserRepository
        public: true

    phpbb\user\Repository\DbalGroupRepository: ~

    phpbb\user\Contract\GroupRepositoryInterface:
        alias: phpbb\user\Repository\DbalGroupRepository
        public: true

    phpbb\user\Repository\DbalBanRepository: ~

    phpbb\user\Contract\BanRepositoryInterface:
        alias: phpbb\user\Repository\DbalBanRepository
        public: true

    phpbb\user\Service\UserSearchService: ~

    phpbb\user\Service\UserDisplayService: ~

    phpbb\user\Service\BanService: ~

    # ---------------------------------------------------------------------------
    # Auth module (M3)
    # ---------------------------------------------------------------------------

    phpbb\user\Service\PasswordService: ~

    phpbb\user\Contract\PasswordServiceInterface:
        alias: phpbb\user\Service\PasswordService

    phpbb\auth\Service\TokenService:
        arguments:
            $jwtSecret: '%env(PHPBB_JWT_SECRET)%'

    phpbb\auth\Contract\TokenServiceInterface:
        alias: phpbb\auth\Service\TokenService
        public: true

    # ---------------------------------------------------------------------------
    # Hierarchy module
    # ---------------------------------------------------------------------------

    phpbb\hierarchy\Repository\DbalForumRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\hierarchy\Contract\ForumRepositoryInterface:
        alias: phpbb\hierarchy\Repository\DbalForumRepository

    phpbb\hierarchy\Service\TreeService:
        arguments:
            $repository: '@phpbb\hierarchy\Contract\ForumRepositoryInterface'

    phpbb\hierarchy\Contract\TreeServiceInterface:
        alias: phpbb\hierarchy\Service\TreeService

    phpbb\hierarchy\Service\TrackingService:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'
            $repository: '@phpbb\hierarchy\Contract\ForumRepositoryInterface'

    phpbb\hierarchy\Contract\TrackingServiceInterface:
        alias: phpbb\hierarchy\Service\TrackingService

    phpbb\hierarchy\Service\SubscriptionService:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\hierarchy\Contract\SubscriptionServiceInterface:
        alias: phpbb\hierarchy\Service\SubscriptionService

    phpbb\hierarchy\Plugin\ForumBehaviorRegistry: ~

    phpbb\hierarchy\Service\HierarchyService:
        arguments:
            $repository: '@phpbb\hierarchy\Contract\ForumRepositoryInterface'
            $treeService: '@phpbb\hierarchy\Contract\TreeServiceInterface'

    phpbb\hierarchy\Contract\HierarchyServiceInterface:
        alias: phpbb\hierarchy\Service\HierarchyService
        public: true

    phpbb\auth\Service\RefreshTokenService: ~

    phpbb\auth\Contract\RefreshTokenServiceInterface:
        alias: phpbb\auth\Service\RefreshTokenService

    phpbb\auth\Repository\DbalRefreshTokenRepository: ~

    phpbb\auth\Contract\RefreshTokenRepositoryInterface:
        alias: phpbb\auth\Repository\DbalRefreshTokenRepository

    phpbb\auth\Service\AuthenticationService: ~

    phpbb\auth\Contract\AuthenticationServiceInterface:
        alias: phpbb\auth\Service\AuthenticationService
        public: true

    phpbb\auth\Service\AuthorizationService:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\auth\Contract\AuthorizationServiceInterface:
        alias: phpbb\auth\Service\AuthorizationService

    # ---------------------------------------------------------------------------
    # Threads module (M6)
    # ---------------------------------------------------------------------------

    phpbb\threads\Repository\DbalTopicRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\threads\Contract\TopicRepositoryInterface:
        alias: phpbb\threads\Repository\DbalTopicRepository

    phpbb\threads\Repository\DbalPostRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\threads\Contract\PostRepositoryInterface:
        alias: phpbb\threads\Repository\DbalPostRepository

    phpbb\threads\ThreadsService:
        arguments:
            $topicRepository: '@phpbb\threads\Contract\TopicRepositoryInterface'
            $postRepository: '@phpbb\threads\Contract\PostRepositoryInterface'
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\threads\Contract\ThreadsServiceInterface:
        alias: phpbb\threads\ThreadsService
        public: true

    # ---------------------------------------------------------------------------
    # Messaging module (M7)
    # ---------------------------------------------------------------------------

    phpbb\messaging\Repository\DbalConversationRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\ConversationRepositoryInterface:
        alias: phpbb\messaging\Repository\DbalConversationRepository

    phpbb\messaging\Repository\DbalMessageRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\MessageRepositoryInterface:
        alias: phpbb\messaging\Repository\DbalMessageRepository

    phpbb\messaging\Repository\DbalParticipantRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\ParticipantRepositoryInterface:
        alias: phpbb\messaging\Repository\DbalParticipantRepository

    phpbb\messaging\ConversationService:
        arguments:
            $conversationRepo: '@phpbb\messaging\Contract\ConversationRepositoryInterface'
            $participantRepo: '@phpbb\messaging\Contract\ParticipantRepositoryInterface'
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\ConversationServiceInterface:
        alias: phpbb\messaging\ConversationService

    phpbb\messaging\MessageService:
        arguments:
            $conversationRepo: '@phpbb\messaging\Contract\ConversationRepositoryInterface'
            $messageRepo: '@phpbb\messaging\Contract\MessageRepositoryInterface'
            $participantRepo: '@phpbb\messaging\Contract\ParticipantRepositoryInterface'
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\MessageServiceInterface:
        alias: phpbb\messaging\MessageService

    phpbb\messaging\ParticipantService:
        arguments:
            $conversationRepo: '@phpbb\messaging\Contract\ConversationRepositoryInterface'
            $participantRepo: '@phpbb\messaging\Contract\ParticipantRepositoryInterface'
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\ParticipantServiceInterface:
        alias: phpbb\messaging\ParticipantService

    phpbb\messaging\MessagingService:
        arguments:
            $conversationRepo: '@phpbb\messaging\Contract\ConversationRepositoryInterface'
            $messageRepo: '@phpbb\messaging\Contract\MessageRepositoryInterface'
            $participantRepo: '@phpbb\messaging\Contract\ParticipantRepositoryInterface'
            $conversationService: '@phpbb\messaging\Contract\ConversationServiceInterface'
            $messageService: '@phpbb\messaging\Contract\MessageServiceInterface'
            $participantService: '@phpbb\messaging\Contract\ParticipantServiceInterface'
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\MessagingServiceInterface:
        alias: phpbb\messaging\MessagingService
        public: true
