services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    phpbb\api\Controller\:
        resource: '../api/Controller/'
        tags: ['controller.service_arguments']

    phpbb\api\EventSubscriber\:
        resource: '../api/EventSubscriber/'

    # ---------------------------------------------------------------------------
    # Cache layer
    # ---------------------------------------------------------------------------

    phpbb\cache\backend\FilesystemBackend:
        arguments:
            $cacheDir: '%kernel.cache_dir%/phpbb4'

    phpbb\cache\backend\NullBackend: ~

    phpbb\cache\marshaller\VarExportMarshaller: ~

    phpbb\cache\TagVersionStore: ~

    phpbb\cache\CachePoolFactory: ~

    # Default backend alias — swap to NullBackend in test env via services_test.yaml
    phpbb\cache\backend\CacheBackendInterface:
        alias: phpbb\cache\backend\FilesystemBackend

    phpbb\cache\marshaller\MarshallerInterface:
        alias: phpbb\cache\marshaller\VarExportMarshaller

    phpbb\cache\CachePoolFactoryInterface:
        alias: phpbb\cache\CachePoolFactory
        public: true

    # ---------------------------------------------------------------------------
    # Database connection (native PDO — no Doctrine DBAL)
    # ---------------------------------------------------------------------------

    PDO:
        class: PDO
        factory: ['phpbb\db\PdoFactory', 'create']
        arguments:
            $host:     '%env(PHPBB_DB_HOST)%'
            $dbname:   '%env(PHPBB_DB_NAME)%'
            $user:     '%env(PHPBB_DB_USER)%'
            $password: '%env(PHPBB_DB_PASSWD)%'
        public: false

    # ---------------------------------------------------------------------------
    # User module (M2)
    # ---------------------------------------------------------------------------

    phpbb\user\Repository\PdoUserRepository: ~

    phpbb\user\Contract\UserRepositoryInterface:
        alias: phpbb\user\Repository\PdoUserRepository
        public: true

    phpbb\user\Repository\PdoGroupRepository: ~

    phpbb\user\Contract\GroupRepositoryInterface:
        alias: phpbb\user\Repository\PdoGroupRepository
        public: true

    phpbb\user\Repository\PdoBanRepository: ~

    phpbb\user\Contract\BanRepositoryInterface:
        alias: phpbb\user\Repository\PdoBanRepository
        public: true

    phpbb\user\Service\UserSearchService: ~

    phpbb\user\Service\UserDisplayService: ~

    phpbb\user\Service\BanService: ~
