services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    _instanceof:
        phpbb\threads\Contract\ThreadsPluginInterface:
            tags: ['phpbb.threads_plugin']
        phpbb\content\Contract\StoragePluginInterface:
            tags: ['phpbb.storage_plugin']
        phpbb\content\Contract\MetadataPluginInterface:
            tags: ['phpbb.metadata_plugin']

    phpbb\api\Controller\:
        resource: '../api/Controller/'
        tags: ['controller.service_arguments']

    phpbb\api\EventSubscriber\:
        resource: '../api/EventSubscriber/'

    # ---------------------------------------------------------------------------
    # Cache layer
    # ---------------------------------------------------------------------------

    phpbb\cache\backend\FilesystemBackend:
        arguments:
            $cacheDir: '%kernel.cache_dir%/phpbb4'

    phpbb\cache\backend\NullBackend: ~

    phpbb\cache\marshaller\VarExportMarshaller: ~

    phpbb\cache\TagVersionStore: ~

    phpbb\cache\CachePoolFactory: ~

    # Default backend alias — swap to NullBackend in test env via services_test.yaml
    phpbb\cache\backend\CacheBackendInterface:
        alias: phpbb\cache\backend\FilesystemBackend

    phpbb\cache\marshaller\MarshallerInterface:
        alias: phpbb\cache\marshaller\VarExportMarshaller

    phpbb\cache\CachePoolFactoryInterface:
        alias: phpbb\cache\CachePoolFactory
        public: true

    phpbb.cache.pool.search:
        class: phpbb\cache\CachePool
        factory: ['@phpbb\cache\CachePoolFactoryInterface', 'getPool']
        arguments: ['search']

    phpbb.cache.pool.config:
        class: phpbb\cache\CachePool
        factory: ['@phpbb\cache\CachePoolFactoryInterface', 'getPool']
        arguments: ['config']

    phpbb\config\Service\ConfigService:
        arguments:
            $cacheTtl: 3600

    phpbb\config\Contract\ConfigServiceInterface:
        alias: phpbb\config\Service\ConfigService
        public: true

    # ---------------------------------------------------------------------------
    # Database connection (Doctrine DBAL 4 — no ORM, no DoctrineBundle)
    # ---------------------------------------------------------------------------

    phpbb\db\DbalConnectionFactory: ~

    Doctrine\DBAL\Connection:
        factory: ['@phpbb\db\DbalConnectionFactory', 'create']
        arguments:
            $host:     '%env(PHPBB_DB_HOST)%'
            $dbname:   '%env(PHPBB_DB_NAME)%'
            $user:     '%env(PHPBB_DB_USER)%'
            $password: '%env(PHPBB_DB_PASSWD)%'
        public: false

    # ---------------------------------------------------------------------------
    # User module (M2)
    # ---------------------------------------------------------------------------

    phpbb\user\Repository\DbalUserRepository: ~

    phpbb\user\Contract\UserRepositoryInterface:
        alias: phpbb\user\Repository\DbalUserRepository
        public: true

    phpbb\user\Repository\DbalGroupRepository: ~

    phpbb\user\Contract\GroupRepositoryInterface:
        alias: phpbb\user\Repository\DbalGroupRepository
        public: true

    phpbb\user\Repository\DbalBanRepository: ~

    phpbb\user\Contract\BanRepositoryInterface:
        alias: phpbb\user\Repository\DbalBanRepository
        public: true

    phpbb\user\Service\UserSearchService: ~

    phpbb\user\Service\UserDisplayService: ~

    phpbb\user\Service\BanService: ~

    # ---------------------------------------------------------------------------
    # Auth module (M3)
    # ---------------------------------------------------------------------------

    phpbb\user\Service\PasswordService: ~

    phpbb\user\Contract\PasswordServiceInterface:
        alias: phpbb\user\Service\PasswordService

    phpbb\auth\Service\TokenService:
        arguments:
            $jwtSecret: '%env(PHPBB_JWT_SECRET)%'

    phpbb\auth\Contract\TokenServiceInterface:
        alias: phpbb\auth\Service\TokenService
        public: true

    # ---------------------------------------------------------------------------
    # Hierarchy module
    # ---------------------------------------------------------------------------

    phpbb\hierarchy\Repository\DbalForumRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\hierarchy\Contract\ForumRepositoryInterface:
        alias: phpbb\hierarchy\Repository\DbalForumRepository

    phpbb\hierarchy\Service\TreeService:
        arguments:
            $repository: '@phpbb\hierarchy\Contract\ForumRepositoryInterface'

    phpbb\hierarchy\Contract\TreeServiceInterface:
        alias: phpbb\hierarchy\Service\TreeService

    phpbb\hierarchy\Service\TrackingService:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'
            $repository: '@phpbb\hierarchy\Contract\ForumRepositoryInterface'

    phpbb\hierarchy\Contract\TrackingServiceInterface:
        alias: phpbb\hierarchy\Service\TrackingService

    phpbb\hierarchy\Service\SubscriptionService:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\hierarchy\Contract\SubscriptionServiceInterface:
        alias: phpbb\hierarchy\Service\SubscriptionService

    phpbb\hierarchy\Plugin\ForumBehaviorRegistry: ~

    phpbb\hierarchy\Service\HierarchyService:
        arguments:
            $repository: '@phpbb\hierarchy\Contract\ForumRepositoryInterface'
            $treeService: '@phpbb\hierarchy\Contract\TreeServiceInterface'

    phpbb\hierarchy\Contract\HierarchyServiceInterface:
        alias: phpbb\hierarchy\Service\HierarchyService
        public: true

    phpbb\auth\Service\RefreshTokenService: ~

    phpbb\auth\Contract\RefreshTokenServiceInterface:
        alias: phpbb\auth\Service\RefreshTokenService

    phpbb\auth\Repository\DbalRefreshTokenRepository: ~

    phpbb\auth\Contract\RefreshTokenRepositoryInterface:
        alias: phpbb\auth\Repository\DbalRefreshTokenRepository

    phpbb\auth\Service\AuthenticationService: ~

    phpbb\auth\Contract\AuthenticationServiceInterface:
        alias: phpbb\auth\Service\AuthenticationService
        public: true

    phpbb\auth\Service\AuthorizationService:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\auth\Contract\AuthorizationServiceInterface:
        alias: phpbb\auth\Service\AuthorizationService

    # ---------------------------------------------------------------------------
    # Threads module (M6)
    # ---------------------------------------------------------------------------

    phpbb\threads\Repository\DbalTopicRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\threads\Contract\TopicRepositoryInterface:
        alias: phpbb\threads\Repository\DbalTopicRepository

    phpbb\threads\Repository\DbalPostRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\threads\Contract\PostRepositoryInterface:
        alias: phpbb\threads\Repository\DbalPostRepository

    phpbb\threads\ThreadsService:
        arguments:
            $topicRepository: '@phpbb\threads\Contract\TopicRepositoryInterface'
            $postRepository: '@phpbb\threads\Contract\PostRepositoryInterface'
            $connection: '@Doctrine\DBAL\Connection'
            $searchIndexer: '@phpbb\search\Contract\SearchIndexerInterface'
            $threadsPipeline: '@phpbb\threads\Contract\ThreadsPipelineInterface'

    phpbb\threads\Contract\ThreadsServiceInterface:
        alias: phpbb\threads\ThreadsService
        public: true

    # ---------------------------------------------------------------------------
    # Messaging module (M7)
    # ---------------------------------------------------------------------------

    phpbb\messaging\Repository\DbalConversationRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\ConversationRepositoryInterface:
        alias: phpbb\messaging\Repository\DbalConversationRepository

    phpbb\messaging\Repository\DbalMessageRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\MessageRepositoryInterface:
        alias: phpbb\messaging\Repository\DbalMessageRepository

    phpbb\messaging\Repository\DbalParticipantRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\ParticipantRepositoryInterface:
        alias: phpbb\messaging\Repository\DbalParticipantRepository

    phpbb\messaging\ConversationService:
        arguments:
            $conversationRepo: '@phpbb\messaging\Contract\ConversationRepositoryInterface'
            $participantRepo: '@phpbb\messaging\Contract\ParticipantRepositoryInterface'
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\ConversationServiceInterface:
        alias: phpbb\messaging\ConversationService

    phpbb\messaging\MessageService:
        arguments:
            $conversationRepo: '@phpbb\messaging\Contract\ConversationRepositoryInterface'
            $messageRepo: '@phpbb\messaging\Contract\MessageRepositoryInterface'
            $participantRepo: '@phpbb\messaging\Contract\ParticipantRepositoryInterface'
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\MessageServiceInterface:
        alias: phpbb\messaging\MessageService

    phpbb\messaging\ParticipantService:
        arguments:
            $conversationRepo: '@phpbb\messaging\Contract\ConversationRepositoryInterface'
            $participantRepo: '@phpbb\messaging\Contract\ParticipantRepositoryInterface'
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\ParticipantServiceInterface:
        alias: phpbb\messaging\ParticipantService

    phpbb\messaging\MessagingService:
        arguments:
            $conversationRepo: '@phpbb\messaging\Contract\ConversationRepositoryInterface'
            $messageRepo: '@phpbb\messaging\Contract\MessageRepositoryInterface'
            $participantRepo: '@phpbb\messaging\Contract\ParticipantRepositoryInterface'
            $conversationService: '@phpbb\messaging\Contract\ConversationServiceInterface'
            $messageService: '@phpbb\messaging\Contract\MessageServiceInterface'
            $participantService: '@phpbb\messaging\Contract\ParticipantServiceInterface'
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\messaging\Contract\MessagingServiceInterface:
        alias: phpbb\messaging\MessagingService
        public: true

    # ---------------------------------------------------------------------------
    # Storage module (M5b)
    # ---------------------------------------------------------------------------

    phpbb\storage\Repository\DbalStoredFileRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\storage\Contract\StoredFileRepositoryInterface:
        alias: phpbb\storage\Repository\DbalStoredFileRepository

    phpbb\storage\Repository\DbalStorageQuotaRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\storage\Contract\StorageQuotaRepositoryInterface:
        alias: phpbb\storage\Repository\DbalStorageQuotaRepository

    phpbb\storage\Adapter\StorageAdapterFactory:
        arguments:
            $storagePath: '%kernel.project_dir%'

    phpbb\storage\Service\UrlGenerator:
        arguments:
            $baseUrl: '%env(default::PHPBB_BASE_URL)%'

    phpbb\storage\Contract\UrlGeneratorInterface:
        alias: phpbb\storage\Service\UrlGenerator

    phpbb\storage\Quota\QuotaService:
        arguments:
            $quotaRepo: '@phpbb\storage\Contract\StorageQuotaRepositoryInterface'
            $connection: '@Doctrine\DBAL\Connection'
            $dispatcher: '@Symfony\Component\EventDispatcher\EventDispatcherInterface'

    phpbb\storage\Contract\QuotaServiceInterface:
        alias: phpbb\storage\Quota\QuotaService

    phpbb\storage\Service\OrphanService:
        arguments:
            $fileRepo: '@phpbb\storage\Contract\StoredFileRepositoryInterface'
            $adapterFactory: '@phpbb\storage\Adapter\StorageAdapterFactory'
            $quotaService: '@phpbb\storage\Contract\QuotaServiceInterface'
            $connection: '@Doctrine\DBAL\Connection'
            $logger: '@Psr\Log\LoggerInterface'

    phpbb\storage\Contract\OrphanServiceInterface:
        alias: phpbb\storage\Service\OrphanService

    phpbb\storage\StorageService:
        arguments:
            $fileRepo: '@phpbb\storage\Contract\StoredFileRepositoryInterface'
            $quotaService: '@phpbb\storage\Contract\QuotaServiceInterface'
            $orphanService: '@phpbb\storage\Contract\OrphanServiceInterface'
            $urlGenerator: '@phpbb\storage\Contract\UrlGeneratorInterface'
            $adapterFactory: '@phpbb\storage\Adapter\StorageAdapterFactory'
            $connection: '@Doctrine\DBAL\Connection'
            $dispatcher: '@Symfony\Component\EventDispatcher\EventDispatcherInterface'

    phpbb\storage\Contract\StorageServiceInterface:
        alias: phpbb\storage\StorageService
        public: true

    phpbb\storage\Variant\ThumbnailGenerator: ~

    phpbb\storage\Variant\ThumbnailListener:
        arguments:
            $generator: '@phpbb\storage\Variant\ThumbnailGenerator'
            $fileRepo: '@phpbb\storage\Contract\StoredFileRepositoryInterface'
            $adapterFactory: '@phpbb\storage\Adapter\StorageAdapterFactory'
            $dispatcher: '@Symfony\Component\EventDispatcher\EventDispatcherInterface'
        tags:
            - { name: kernel.event_listener, event: phpbb.storage.file_stored, method: onFileStored }

    phpbb\storage\Quota\QuotaReconciliationJob: ~

    phpbb\storage\Orphan\OrphanCleanupJob:
        arguments:
            $orphanService: '@phpbb\storage\Contract\OrphanServiceInterface'

    # ---------------------------------------------------------------------------
    # Notifications module (M8)
    # ---------------------------------------------------------------------------

    phpbb\notifications\Repository\DbalNotificationRepository:
        arguments:
            $connection: '@Doctrine\DBAL\Connection'

    phpbb\notifications\Contract\NotificationRepositoryInterface:
        alias: phpbb\notifications\Repository\DbalNotificationRepository

    phpbb\notifications\TypeRegistry:
        arguments:
            $dispatcher: '@Symfony\Component\EventDispatcher\EventDispatcherInterface'

    phpbb\notifications\MethodManager:
        arguments:
            $dispatcher: '@Symfony\Component\EventDispatcher\EventDispatcherInterface'

    phpbb\notifications\Type\PostNotificationType:
        tags:
            - { name: kernel.event_listener, event: phpbb\notifications\Event\RegisterNotificationTypesEvent, method: register }

    phpbb\notifications\Type\TopicNotificationType:
        tags:
            - { name: kernel.event_listener, event: phpbb\notifications\Event\RegisterNotificationTypesEvent, method: register }

    phpbb\notifications\Method\BoardNotificationMethod:
        tags:
            - { name: kernel.event_listener, event: phpbb\notifications\Event\RegisterDeliveryMethodsEvent, method: register }

    phpbb\notifications\Method\EmailNotificationMethod:
        tags:
            - { name: kernel.event_listener, event: phpbb\notifications\Event\RegisterDeliveryMethodsEvent, method: register }

    phpbb\notifications\Service\NotificationService:
        arguments:
            $repository: '@phpbb\notifications\Contract\NotificationRepositoryInterface'
            $cacheFactory: '@phpbb\cache\CachePoolFactoryInterface'

    phpbb\notifications\Contract\NotificationServiceInterface:
        alias: phpbb\notifications\Service\NotificationService
        public: true

    phpbb\notifications\Listener\CacheInvalidationSubscriber:
        arguments:
            $cacheFactory: '@phpbb\cache\CachePoolFactoryInterface'
        tags:
            - { name: kernel.event_subscriber }

    # ---------------------------------------------------------------------------
    # Config module (M9 — phpbb_config reader)
    # ---------------------------------------------------------------------------

    phpbb\config\ConfigRepository: ~

    phpbb\config\Contract\ConfigRepositoryInterface:
        alias: phpbb\config\ConfigRepository

    phpbb\config\ConfigTextRepository: ~

    phpbb\config\Contract\ConfigTextRepositoryInterface:
        alias: phpbb\config\ConfigTextRepository

    phpbb\config\Service\ConfigTextService: ~

    phpbb\config\Contract\ConfigTextServiceInterface:
        alias: phpbb\config\Service\ConfigTextService
        public: true

    # ---------------------------------------------------------------------------
    # Search module (M10)
    # ---------------------------------------------------------------------------

    phpbb\search\Driver\LikeDriver: ~
    phpbb\search\Driver\FullTextDriver: ~
    phpbb\search\Driver\ElasticsearchDriver: ~
    phpbb\search\Tokenizer\NativeTokenizer: ~
    phpbb\search\Driver\NativeDriver: ~
    phpbb\search\Service\SearchService:
        arguments:
            $fullTextDriver: '@phpbb\search\Driver\FullTextDriver'
            $likeDriver: '@phpbb\search\Driver\LikeDriver'
            $elasticsearchDriver: '@phpbb\search\Driver\ElasticsearchDriver'
            $nativeDriver: '@phpbb\search\Driver\NativeDriver'
            $configRepository: '@phpbb\config\Contract\ConfigRepositoryInterface'
            $cache: '@phpbb.cache.pool.search'
    phpbb\search\Contract\SearchServiceInterface:
        alias: phpbb\search\Service\SearchService

    phpbb\search\Service\SearchIndexerService:
        arguments:
            $cache: '@phpbb.cache.pool.search'
    phpbb\search\Service\NullSearchIndexer: ~
    phpbb\search\Contract\SearchIndexerInterface:
        alias: phpbb\search\Service\SearchIndexerService

    # ---------------------------------------------------------------------------
    # Content module (M11a — plugin pipeline)
    # ---------------------------------------------------------------------------

    phpbb\threads\Pipeline\ThreadsPipeline: ~

    phpbb\threads\Contract\ThreadsPipelineInterface:
        alias: phpbb\threads\Pipeline\ThreadsPipeline
        public: true

    phpbb\content\Pipeline\StoragePipeline: ~

    phpbb\content\Contract\StoragePipelineInterface:
        alias: phpbb\content\Pipeline\StoragePipeline
        public: true

    phpbb\content\Service\MetadataService: ~

    phpbb\content\Contract\MetadataServiceInterface:
        alias: phpbb\content\Service\MetadataService
        public: true

    phpbb\plugins\:
        resource: '../plugins/'
